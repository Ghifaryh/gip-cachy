general {
    lock_cmd = pidof hyprlock || hyprlock       
    before_sleep_cmd = loginctl lock-session    
    after_sleep_cmd = hyprctl dispatch dpms on  
    
    # CRITICAL: This makes the system wait for hyprlock to finish 
    # loading its surfaces before actually sleeping/turning off.
    inhibit_sleep = 3
}

# 1. 150s: Dim the screen
listener {
    timeout = 150                                
    on-timeout = brightnessctl -s set 10%        
    on-resume = brightnessctl -r                
}

# 2. 180s: ONLY Lock (Don't turn off screen yet!)
# Give hyprlock 10–20 seconds to "exist" before we kill the monitor signal.
listener {
    timeout = 180                                
    on-timeout = loginctl lock-session
}

# 3. 210s: Turn off Screen (30 seconds after locking)
listener {
    timeout = 210
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 4. 330s: Suspend
listener {
    timeout = 330
    on-timeout = systemctl suspend
}
