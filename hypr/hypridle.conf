general {
    lock_cmd = pidof hyprlock || hyprlock       
    before_sleep_cmd = loginctl lock-session    
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after sleep
}

# 1. 150s: Dim the screen (Warning)
listener {
    timeout = 150                                
    on-timeout = brightnessctl -s set 10%       # -s saves the current brightness
    on-resume = brightnessctl -r                # -r restores it
}

# 2. 180s: Lock and turn off Screen
# We move the suspend logic AFTER this so the session is definitely locked first.
listener {
    timeout = 180                                
    on-timeout = loginctl lock-session && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 3. 300s (5 min): Suspend
# This must be LONGER than the lock timeout. 
# If you want it to happen 2 mins after locking, set it to 300 (180 + 120).
listener {
    timeout = 300
    on-timeout = systemctl suspend
}
