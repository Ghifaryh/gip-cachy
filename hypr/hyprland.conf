# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
# bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod SHIFT, B, exec, xdg-open "https://"  # default browser
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

bind = $mainMod, SPACE, exec, ~/.config/rofi/launchers/type-6/launcher.sh
bind = $mainMod, ESCAPE, exec, wlogout
# Manual Lock: Instant Lock + Screen Off
# bind = $mainMod, L, exec, loginctl lock-session && sleep 1 && hyprctl dispatch dpms off
bind = $mainMod, L, exec, loginctl lock-session

# bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
# bind = SUPER, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/launchers/type-6/style-1.rasi | cliphist decode | wl-copy
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/launchers/type-7/style-7.rasi | cliphist decode | wl-copy
bind = SHIFT, Print, exec, hyprshot -m region --clipboard-only

bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/wbrestart.sh #restart waybar

# Open emoji picker with Win + .
bind = $mainMod, PERIOD, exec, rofimoji --action type --selector-args "-theme ~/.config/rofi/emoji.rasi"

# Resize windows with Super and +/-
binde = $mainMod, EQUAL, resizeactive, 40 40    # Super + Plus (actually the = key)
binde = $mainMod, MINUS, resizeactive, -40 -40  # Super + Minus

# bind = SUPER, F10, exec, hyprctl keyword monitor eDP-1,2880x1800@60,0x0,1.5 && notify-send "Display" "Refresh Rate set to 60Hz (Power Save)" -i display
# bind = SUPER, F11, exec, hyprctl keyword monitor eDP-1,2880x1800@90,0x0,1.5 && notify-send "Display" "Refresh Rate set to 90Hz (Smooth)" -i display

bind = SUPER, F11, exec, ~/.config/hypr/scripts/hz_cycle.sh
bind = $mainMod, F12, exec, asusctl profile next && notify-send "ASUS Profile" "$(asusctl profile get | grep 'Active profile')" -i diagnostic
# bind = $mainMod, F12, exec, ~/.config/hypr/scripts/power_cycle.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# tmux workspace
workspace = special:scratchpad, on-created-empty:kitty tmux

bind = $mainMod, T, togglespecialworkspace, scratchpad
bind = $mainMod, T, movetoworkspace, special:scratchpad

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Volume with Visual OSD
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100}')" "Volume"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100}')" "Volume"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low "Mute" "Toggled"

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
# bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh --inc
# bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh --dec
# Brightness with Visual OSD
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -h int:value:"$(brightnessctl i | grep -oP '\(\K[^%]+')" "Brightness"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -h int:value:"$(brightnessctl i | grep -oP '\(\K[^%]+')" "Brightness"

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = firefox-pip
    # Match props
    match:class = ^(firefox)$
    match:title = ^Picture-in-Picture$
    
    # Effects
    float = on
    pin = on

    animation = none

    size = 530 300
    # move = 1385 895
    move = 1380 830
}

windowrule = no_blur on, match:class firefox 

windowrule = opacity 0.6 0.6, match:float true
windowrule = opacity 0.8 0.8, match:class kitty

windowrule = float on, match:class ^(bluetui-float|impala-float)$
windowrule = size 600 400, match:class ^(bluetui-float|impala-float)$
windowrule = center on, match:class ^(bluetui-float|impala-float)$
