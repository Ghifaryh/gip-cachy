# Corrected Prefix Setup
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Fix Colors (Crucial for modern terminals)
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse mode
set -g mouse on

# Better splitting commands
bind | split-window -h
bind - split-window -v

# --- General Config ---
set -g base-index 1           # Start numbering windows at 1
setw -g pane-base-index 1     # Start numbering panes at 1

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Also allow clearing the screen with Prefix + Ctrl + L 
# (since Ctrl+L is now used for navigation)
bind C-l send-keys 'C-l'

# Catppuccin Theme Config
set -g @catppuccin_flavor 'mocha' # or frappe, macchiato
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_modules_right "directory battery date_time"

# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
