# Corrected Prefix Setup
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Fix Colors (Crucial for modern terminals)
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse mode
set -g mouse on

# Better splitting commands
bind | split-window -h
bind - split-window -v

# --- General Config ---
set -g base-index 1           # Start numbering windows at 1
setw -g pane-base-index 1     # Start numbering panes at 1

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin Theme Config
set -g @catppuccin_flavor 'mocha' # or frappe, macchiato
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_modules_right "directory battery date_time"

# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
